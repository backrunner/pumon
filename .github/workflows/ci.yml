name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: npm --prefix packages/node-support install
      - run: npm --prefix packages/node-support run build
      - run: npm --prefix packages/cluster-shim test
      - run: cargo build -p procwatch-cli
      - run: npm --prefix packages/procwatch test
      - run: npm pack --dry-run
        working-directory: packages/procwatch
      - run: scripts/smoke.sh
