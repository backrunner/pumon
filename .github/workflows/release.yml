name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo test --workspace
      - run: cargo build --release -p procwatch-cli --target ${{ matrix.target }}
      - shell: bash
        run: scripts/build-release.sh "${GITHUB_REF_NAME#v}" "${{ matrix.target }}" "${{ matrix.archive }}"
      - uses: actions/upload-artifact@v4
        with:
          name: procwatch-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          mkdir -p dist
          find artifacts -type f -maxdepth 3 -exec cp {} dist/ \;
          cd dist
          sha256sum procwatch-v*.tar.gz procwatch-v*.zip > "procwatch-${GITHUB_REF_NAME}-checksums.txt"
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
          files: dist/*
